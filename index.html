<!-- 🟢 index.html -->
<!-- OkObserver / Arnold Admin — FULL REPLACEMENT (Build 2026-03-09R1 — Timeline + Health Summary + Support Clipboard Pack) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arnold Admin</title>

  <style>
    :root{
      --brand:#1E90FF;
      --bg:#f4f6fb;
      --card:#ffffff;
      --muted:#6b7280;
      --text:#0f172a;
      --border:rgba(15,23,42,.10);
      --shadow:0 10px 26px rgba(15,23,42,.08);
      --radius:16px;
    }
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      font-size:16px;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:5;
      background:var(--brand);
      color:#fff;
      box-shadow:0 8px 22px rgba(0,0,0,.12);
      padding:12px 16px;
    }
    .topbar-inner{
      max-width:1500px;
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:220px;
    }
    .brand img{
      width:44px;
      height:44px;
      border-radius:10px;
      object-fit:cover;
      background:#fff;
    }
    .brand .title{
      display:flex;
      flex-direction:column;
      line-height:1.15;
    }
    .brand .title b{
      font-size:18px;
      letter-spacing:.2px;
    }
    .brand .title span{
      font-size:12px;
      opacity:.95;
      margin-top:2px;
    }

    .session-pill{
      background:rgba(255,255,255,.20);
      border:1px solid rgba(255,255,255,.26);
      color:#fff;
      padding:8px 12px;
      border-radius:999px;
      font-weight:650;
      font-size:13px;
      display:flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#fca5a5;
      box-shadow:0 0 0 3px rgba(252,165,165,.20);
      flex:0 0 auto;
      transition: background .15s ease, box-shadow .15s ease;
    }
    .session-pill.ok .dot{
      background:#22c55e;
      box-shadow:0 0 0 3px rgba(34,197,94,.22);
    }

    .wrap{
      max-width:1500px;
      margin:18px auto 44px;
      padding:0 16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .search-card{
      padding:14px 14px 10px;
      margin-bottom:14px;
      background:var(--brand);
      border:0;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:12px;
      align-items:end;
    }
    .field label{
      display:block;
      font-size:12px;
      font-weight:700;
      color:rgba(255,255,255,.90);
      margin:0 0 6px;
      letter-spacing:.2px;
    }
    .field input{
      width:100%;
      box-sizing:border-box;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.32);
      background:rgba(255,255,255,.92);
      outline:none;
      font-size:14px;
    }
    .field input:focus{border-color:#fff}
    .btn{
      cursor:pointer;
      border:0;
      border-radius:12px;
      padding:10px 14px;
      font-weight:800;
      background:#fff;
      color:var(--brand);
      box-shadow:0 8px 18px rgba(0,0,0,.10);
    }
    .btn.ghost{
      background:rgba(255,255,255,.18);
      color:#fff;
      border:1px solid rgba(255,255,255,.26);
      box-shadow:none;
    }

    /* Status line: visible only when it has text */
    #statusLine{ display:block; }
    #statusLine:empty{ display:none; }

    .msg{
      margin-top:12px;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(30,144,255,.22);
      background:rgba(30,144,255,.10);
      color:#0b3b7a;
      font-weight:750;
    }
    .msg.warn{
      border-color:rgba(251,191,36,.40);
      background:rgba(251,191,36,.16);
      color:#6b4a00;
    }

    /* Busy spinner (left-justified inside the message) */
    .msg.busy{
      background: var(--brand);
      border-color: rgba(30,144,255,.55);
      color: #fff;
      position: relative;
      padding-left: 44px;
    }
    .msg.busy::before{
      content: "";
      position: absolute;
      left: 16px;
      top: 50%;
      width: 16px;
      height: 16px;
      margin-top: -8px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.55);
      border-top-color: #fff;
      animation: aaSpin 0.9s linear infinite;
    }
    @keyframes aaSpin { to { transform: rotate(360deg); } }

    .results{ display:flex; flex-direction:column; gap:14px; }

    .rawjson-toggle{
      position:static;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:14px;
      padding:10px 14px;
      border-radius:999px;
      border:0;
      cursor:pointer;
      font-weight:950;
      background:#0b1220;
      color:#fff;
      box-shadow:0 12px 26px rgba(0,0,0,.20);
    }

    pre{
      background:#0b1220;
      color:#e5e7eb;
      border-radius:14px;
      padding:12px;
      overflow:auto;
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      line-height:1.35;
      max-height:46vh;
    }

    .aa-section{ padding:14px; }
    .aa-section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:2px 2px 10px;
      border-bottom:1px solid var(--border);
      margin-bottom:12px;
    }
    .aa-section-title{ font-weight:950; font-size:16px; letter-spacing:.2px; }
    .aa-section-subtitle{ font-size:12px; font-weight:700; color:var(--muted); }

    /* ----------------------------------------------------
       ✅ Arnold Admin renderer contract (aa-*) — pretty tables/cards
       ---------------------------------------------------- */
    .aa-card{
      margin-top:12px;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(15,23,42,.02);
      box-shadow:none;
    }
    .aa-card-title{
      font-weight:900;
      font-size:14px;
      margin-bottom:10px;
    }

    /* Field tiles (label on top, value beneath) */
    .aa-tiles{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:12px;
      align-items:start;
    }
    .aa-tile{
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      padding:10px 10px 9px;
      min-height:54px;
    }
    .aa-label{
      font-size:12px;
      font-weight:950;
      color:var(--brand);
      margin:0 0 6px;
    }
    .aa-value{
      font-size:14px;
      font-weight:850;
      color:#0b1220;
      line-height:1.25;
      word-break:break-word;
    }

    /* Customer: 3 across on desktop (ID / Username / Name) */
    .aa-tiles.customer{ grid-template-columns:repeat(3, minmax(0, 1fr)); }

    /* Billing/Shipping: exactly 2 columns section layout (Billing left, Shipping right) */
    .aa-grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      align-items:start;
    }

    /* Billing/Shipping card internals: one column of tiles (Name/Address/Email/Phone stacked) */
    .aa-tiles.onecol{ grid-template-columns:1fr; }
    /* Make Billing/Shipping look like ONE card: remove mini-card styling inside onecol tiles */
.aa-tiles.onecol{
  gap:8px;
}

.aa-tiles.onecol .aa-tile{
  border:none;
  background:transparent;
  padding:0;
  min-height:auto;
  border-radius:0;
}

.aa-tiles.onecol .aa-label{
  margin:0 0 4px;
}

.aa-tiles.onecol .aa-value{
  font-weight:800;
} 
/* Billing/Shipping: label left, value right */
.aa-tiles.onecol .aa-tile{
  display:grid;
  grid-template-columns:120px 1fr;
  column-gap:14px;
  align-items:start;
}

.aa-tiles.onecol .aa-label{
  margin:0;
  line-height:1.2;
  white-space:nowrap;
}

.aa-tiles.onecol .aa-value{
  margin:0;
  line-height:1.25;
  word-break:break-word;
}
    .aa-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:4px 10px;
      font-weight:950;
      font-size:12px;
      white-space:nowrap;
      border:1px solid rgba(0,0,0,.08);
      background:#fff;
      color:#374151;
    }
    .aa-pill.active,
    .aa-pill.completed{
      background:#dcfce7;
      color:#166534;
      border-color:#bbf7d0;
    }
    .aa-pill.processing{
      background:#dbeafe;
      color:#1e3a8a;
      border-color:#bfdbfe;
    }
    .aa-pill.on-hold,
    .aa-pill.pending-cancel{
      background:#fef3c7;
      color:#92400e;
      border-color:#fde68a;
    }
    .aa-pill.pending{
      background:#e5e7eb;
      color:#374151;
      border-color:#d1d5db;
    }
    .aa-pill.cancelled,
    .aa-pill.failed,
    .aa-pill.expired,
    .aa-pill.trash,
    .aa-pill.refunded{
      background:#fee2e2;
      color:#991b1b;
      border-color:#fecaca;
    }

    .aa-copy-row{
      margin-top:8px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .aa-copy-btn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid rgba(30,144,255,.22);
      background:rgba(30,144,255,.08);
      color:var(--brand);
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
    }
    .aa-copy-btn:hover{
      background:rgba(30,144,255,.14);
    }
    .aa-copy-btn.copied{
      background:#dcfce7;
      border-color:#bbf7d0;
      color:#166534;
    }

.aa-value-inline{
  display:inline-flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}
.aa-value-text{
  overflow-wrap:anywhere;
}
    .aa-copy-icon{
      flex:0 0 auto;
      border:none;
      background:transparent;
      cursor:pointer;
      font-size:15px;
      line-height:1;
      margin-left:6px;
      padding:0;
      opacity:.55;
      transition:opacity .15s ease, transform .05s ease;
    }
    .aa-copy-icon:hover{
      opacity:1;
    }
    .aa-copy-icon:active{
      transform:scale(.92);
    }
    .aa-copy-icon.copied{
      opacity:1;
      color:#166534;
    }

    /* Tables (Subscriptions / Orders) */
    .aa-table-wrap{
      width:100%;
      overflow:auto;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
    }
    table.aa-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width:860px; /* allows Orders columns without crushing */
    }
.aa-table thead th{
  position:sticky;
  top:0;
  z-index:2;
  background:#ffffff;
  color:var(--brand);
  font-size:12px;
  font-weight:950;
  text-align:left;
  padding:10px 12px;
  border-bottom:2px solid rgba(0,0,0,.08);
  box-shadow:0 2px 0 rgba(0,0,0,.04);
  white-space:nowrap;
  vertical-align:middle;
}
    .aa-table thead th.aa-right,
    .aa-table tbody td.aa-right{
      text-align:right;
    }
.aa-table tbody td{
  padding:11px 14px;
  border-bottom:1px solid rgba(15,23,42,.06);
  vertical-align:middle;
  font-size:14px;
  font-weight:850;
  color:#0b1220;
  white-space:nowrap;
  background:#fff;
}
.aa-table tbody tr:hover td{
  background:rgba(30,144,255,.04);
}
    .aa-table tbody tr:last-child td{ border-bottom:0; }
    /* Totals */
    .aa-totals-wrap{ margin-top:14px; }
    .aa-totals-grid{ align-items:start; }
    .aa-right{ text-align:right; }

    .aa-totals-table{ width:100%; border-collapse:collapse; }
    .aa-totals-table th,
    .aa-totals-table td{
      padding:10px 10px;
      border-bottom:1px solid rgba(0,0,0,.06);
      font-size:14px;
      vertical-align:middle;
    }
    .aa-totals-table th{
      text-transform:uppercase;
      letter-spacing:.04em;
      font-size:12px;
      color:#4b5563;
      font-weight:850;
    }
    .aa-totals-table tbody tr:last-child td{ border-bottom:0; }

    .aa-totals-meta{ margin-top:10px; }

    @media (max-width: 860px){
      .aa-totals-grid{ grid-template-columns:1fr; }
    }
    .aa-order-id,
    .aa-sub-id{
      font-weight:950;
      color:var(--brand);
      text-decoration:none;
      margin-right:10px;
    }

    .aa-order-id:hover,
    .aa-sub-id:hover{
      text-decoration:underline;
    }
    .aa-muted{ color:var(--muted); font-weight:850; }

    /* Notes toggle (right aligned) */
    .aa-notes-cell{ text-align:right; }
    .aa-notes-toggle{
      cursor:pointer;
      border:0;
      background:transparent;
      color:var(--brand);
      font-weight:950;
      font-size:14px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:4px 6px;
    }
    .aa-notes-count{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:18px;
      padding:0 7px;
      border-radius:999px;
      border:1px solid rgba(30,144,255,.35);
      background:rgba(30,144,255,.12);
      color:rgba(30,144,255,.98);
      font-size:12px;
      font-weight:950;
    }
    .aa-notes-arrow{
      font-size:12px;
      color:rgba(30,144,255,.98);
      transform:translateY(1px);
    }

    /* Expanded notes row */
    .aa-notes-row td{
      background:rgba(15,23,42,.02);
      padding:12px;
    }
    .aa-notes-box{
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      padding:10px;
    }
    .aa-note{
      border:1px solid rgba(15,23,42,.10);
      border-radius:12px;
      background:#fff;
      padding:10px;
      margin-bottom:10px;
    }
    .aa-note:last-child{ margin-bottom:0; }
    .aa-note-meta{
      font-size:12px;
      font-weight:950;
      color:#334155;
      margin-bottom:6px;
    }
    .aa-note-text{
      font-size:13px;
      font-weight:750;
      color:#0b1220;
      line-height:1.35;
      white-space:pre-wrap;
    }

    /* Arnold Admin — Totals layout (OkObserver-ish) */
.aa-totals-grid{
  display:flex;
  gap:14px;
  align-items:stretch;
  flex-wrap:wrap;
  margin-top:14px;
}
.aa-totals-card{
  flex:1 1 420px;
  min-width:280px;
}
table.aa-totals-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}
table.aa-totals-table td{
  padding:10px 12px;
  border-bottom:1px solid rgba(0,0,0,0.08);
  vertical-align:middle;
}
table.aa-totals-table td:first-child{
  font-weight:700;
}
table.aa-totals-table td.aa-num{
  text-align:right;
  font-weight:800;
  font-variant-numeric: tabular-nums;
  white-space:nowrap;
}
table.aa-totals-table tr.aa-totals-divider td{
  padding:8px 0;
  border-bottom:0;
}
table.aa-totals-table tr.aa-totals-divider td::after{
  content:"";
  display:block;
  height:1px;
  background:rgba(0,0,0,0.12);
}
table.aa-totals-table tr.aa-totals-total td{
  border-bottom:0;
  padding-top:12px;
}
    @media (max-width: 980px){
      .grid{ grid-template-columns:1fr 1fr; }
      .grid .btn{ grid-column:1 / -1 }
      .aa-grid-2{ grid-template-columns:1fr; }
      .aa-tiles.customer{ grid-template-columns:1fr; }
      table.aa-table{ min-width:720px; }
    }
  


/* Activity Timeline / Health / Clipboard Pack */
.aa-health-wrap{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
  gap:12px;
}
.aa-health-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:10px;
}
.aa-health-grid .aa-tile .aa-value .aa-pill{
  vertical-align:middle;
}
.aa-clipboard-pack{
  background:rgba(30,144,255,.05);
}
.aa-copy-row-pack{
  margin-top:0;
  margin-bottom:12px;
}
.aa-clipboard-summary{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
  gap:10px;
}
.aa-clipboard-item{
  border:1px solid var(--border);
  background:#fff;
  border-radius:12px;
  padding:10px 12px;
  font-weight:800;
  color:#0b1220;
}
.aa-timeline{
  position:relative;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.aa-timeline-item{
  display:grid;
  grid-template-columns:26px 1fr;
  gap:12px;
  align-items:start;
}
.aa-timeline-rail{
  position:relative;
  min-height:100%;
}
.aa-timeline-rail::before{
  content:"";
  position:absolute;
  left:12px;
  top:0;
  bottom:-12px;
  width:2px;
  background:rgba(30,144,255,.18);
}
.aa-timeline-item:last-child .aa-timeline-rail::before{
  bottom:12px;
}
.aa-timeline-dot{
  position:relative;
  z-index:1;
  display:block;
  width:10px;
  height:10px;
  margin:8px 0 0 7px;
  border-radius:50%;
  background:var(--brand);
  box-shadow:0 0 0 4px rgba(30,144,255,.12);
}
.aa-timeline-body{
  border:1px solid var(--border);
  background:#fff;
  border-radius:14px;
  padding:10px 12px;
}
.aa-timeline-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.aa-timeline-label{
  font-weight:950;
  color:#0b1220;
}
.aa-timeline-date{
  font-size:12px;
  font-weight:900;
  color:var(--muted);
  white-space:nowrap;
}
.aa-timeline-meta{
  margin-top:4px;
  font-size:13px;
  font-weight:750;
  color:#334155;
}
.aa-timeline-badge{
  margin-top:8px;
}

/* timeline indicator */
.aa-type-cell{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.aa-type-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);display:inline-block;}
.aa-order-flag{
  display:inline-flex;
  align-items:center;
  border-radius:999px;
  padding:2px 8px;
  font-size:11px;
  font-weight:900;
  white-space:nowrap;
}
.aa-order-flag-latest{
  color:var(--brand);
  background:rgba(30,144,255,.10);
  border:1px solid rgba(30,144,255,.22);
}
.aa-order-flag-problem{
  color:#991b1b;
  background:#fee2e2;
  border:1px solid #fecaca;
}

</style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <img src="./logo.png" alt="Arnold Admin logo" />
        <div class="title">
          <b>Arnold Admin</b>
          <span>OkObserver admin lookups (cookie session)</span>
        </div>
      </div>

      <div id="sessionPill" class="session-pill">
        <span class="dot"></span>
        <span id="sessionText">Session: unknown</span>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="card search-card">
      <div class="grid">
        <div class="field">
          <label for="loginUser">Username</label>
          <input id="loginUser" autocomplete="username" placeholder="admin username" />
        </div>

        <div class="field">
          <label for="loginPass">Password</label>
          <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••••" />
        </div>

        <div style="display:flex; gap:10px; align-items:end; justify-content:flex-end;">
          <button id="btnLogin" class="btn">Login</button>
          <button id="btnLogout" class="btn ghost">Logout</button>
        </div>

        <div class="field" style="grid-column:1 / span 2;">
          <label for="q">Search</label>
          <input id="q" placeholder="Find subscription for email, find order #12345, etc." />
        </div>

        <div style="display:flex; align-items:end; justify-content:flex-end;">
          <button id="btnSearch" class="btn">Search</button>
          <button id="btnTotals" class="btn ghost" style="margin-left:10px;">Totals</button>
        </div>

        <div style="grid-column:1 / -1; display:flex; justify-content:flex-start; gap:10px;">
          <div id="statusLine" class="msg"></div>
        </div>
      </div>
    </div>

    <div id="results" class="results"></div>

    <button id="btnRawJson" class="rawjson-toggle">Toggle Raw JSON</button>
  </div>

  <!-- Cache-bust MUST match main.js build -->
  <script src="./main.js?v=2026-03-09-001"></script>
