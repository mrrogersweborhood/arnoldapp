<!-- 🟢 index.html -->
<!-- OkObserver / Arnold Admin — FULL REPLACEMENT (Build 2026-02-26e — Restore table layout + billing/shipping email/phone) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arnold Admin</title>
  <style>
    :root{
      --blue:#1E90FF;
      --bg:#f3f6fb;
      --card:#fff;
      --text:#101418;
      --muted:#6b7280;
      --border:rgba(0,0,0,.08);
      --shadow:0 10px 25px rgba(0,0,0,.08);
      --radius:14px;
      --radius2:18px;
      --max:1200px;
      --font:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:var(--font);
      background:var(--bg);
      color:var(--text);
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:var(--blue);
      color:#fff;
      box-shadow:0 4px 14px rgba(0,0,0,.15);
    }
    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:10px 16px;
      display:flex;
      align-items:center;
      gap:14px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:220px;
    }
    .logo{
      width:44px;height:44px;
      border-radius:10px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      box-shadow:0 3px 10px rgba(0,0,0,.18);
      flex:0 0 auto;
    }
    .logo img{ width:100%; height:100%; object-fit:cover; }
    .brand-text{ line-height:1.15; }
    .brand-title{ font-weight:900; letter-spacing:.2px; font-size:18px; }
    .brand-sub{ font-size:12px; opacity:.9; }
    .pill{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:10px;
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.25);
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      white-space:nowrap;
    }
    .dot{
      width:10px;height:10px;border-radius:50%;
      background:#ff3b30;
      box-shadow:0 0 0 4px rgba(255,59,48,.22);
    }
    .dot.ok{
      background:#2dd36f;
      box-shadow:0 0 0 4px rgba(45,211,111,.22);
    }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:18px 16px 48px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius2);
      box-shadow:var(--shadow);
    }

    .auth{
      padding:16px;
      margin-top:12px;
      background:linear-gradient(0deg, rgba(255,255,255,.08), rgba(255,255,255,.08)), var(--blue);
      border:0;
      color:#fff;
    }
    .auth .row{
      display:grid;
      grid-template-columns: 1fr 1fr auto;
      gap:14px;
      align-items:end;
    }
    .auth label{
      font-size:12px;
      font-weight:800;
      opacity:.95;
      display:block;
      margin-bottom:6px;
    }
    .auth input{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.35);
      background:rgba(255,255,255,.92);
      font-size:14px;
      outline:none;
    }
    .btns{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      padding-bottom:2px;
    }
    button{
      cursor:pointer;
      border:0;
      border-radius:14px;
      padding:10px 14px;
      font-weight:800;
      background:#fff;
      color:var(--blue);
      box-shadow:0 8px 18px rgba(0,0,0,.12);
    }
    button.secondary{
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.28);
      color:#fff;
      box-shadow:none;
    }

    .search-row{
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:12px;
      align-items:end;
      margin-top:12px;
    }
    .search-row label{
      font-size:12px;
      font-weight:800;
      opacity:.95;
      display:block;
      margin-bottom:6px;
    }
    .search-row input{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.35);
      background:rgba(255,255,255,.92);
      font-size:14px;
      outline:none;
    }

    .msg{
      margin-top:12px;
      font-weight:900;
      font-size:14px;
      opacity:.95;
      text-align:left;
    }
    .msg.ok{ color:#eafff1; }
    .msg.warn{ color:#fff; }
    .msg.err{ color:#ffe9e7; }

    .toggle-raw{
      margin:16px 0 10px;
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:10px 14px;
      box-shadow:0 12px 26px rgba(0,0,0,.16);
    }

    .section{
      margin-top:16px;
    }
    .aa-section{
      padding:0;
      overflow:hidden;
    }
    .aa-section-head{
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:rgba(30,144,255,.04);
    }
    .aa-section-title{
      font-weight:900;
      letter-spacing:.2px;
    }
    .aa-section-meta{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
    }

    .aa-card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      margin:14px 16px 16px;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
    }
    .aa-card-title{
      font-weight:900;
      font-size:14px;
      margin-bottom:10px;
      color:#111;
    }

    .aa-subblock{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(0,0,0,.08);
    }
    .aa-subtitle{
      font-weight:800;
      font-size:12px;
      letter-spacing:.02em;
      text-transform:uppercase;
      color:#1E90FF;
      margin:0 0 10px 0;
    }
    .aa-subhead{
      font-weight:800;
      font-size:12px;
      color:#111;
      margin:0 0 10px 0;
    }

    .aa-grid-2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }

    .aa-tiles{
      display:grid;
      gap:10px;
    }
    .aa-tiles.customer{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
    .aa-tiles.twocol{ grid-template-columns:repeat(2, minmax(0, 1fr)); }
    .aa-tiles.onecol{ grid-template-columns: 1fr; }

    .aa-tile{
      border:1px solid var(--border);
      border-radius:14px;
      padding:10px 12px;
      background:#fff;
      box-shadow:0 6px 14px rgba(0,0,0,.04);
      min-height:54px;
    }
    .aa-label{
      font-size:12px;
      font-weight:900;
      color:var(--blue);
      margin-bottom:4px;
    }
    .aa-value{
      font-weight:800;
      color:#111;
      font-size:14px;
      line-height:1.2;
      word-break:break-word;
    }
    .aa-muted{
      color:var(--muted);
      font-weight:800;
    }

    table.aa-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      font-size:14px;
    }
    .aa-table thead th{
      text-align:left;
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      letter-spacing:.02em;
      text-transform:uppercase;
      background:rgba(30,144,255,.03);
    }
    .aa-table tbody td{
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      vertical-align:top;
    }
    .aa-table tbody tr:last-child td{ border-bottom:0; }

    .aa-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:4px 10px;
      border-radius:999px;
      font-weight:900;
      font-size:12px;
      border:1px solid rgba(30,144,255,.25);
      background:rgba(30,144,255,.08);
      color:var(--blue);
      white-space:nowrap;
    }
    .aa-notes-cell{ text-align:right; white-space:nowrap; }
    .aa-notes-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(30,144,255,.25);
      background:rgba(30,144,255,.06);
      color:var(--blue);
      font-weight:900;
      cursor:pointer;
      user-select:none;
    }
    .aa-notes-count{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:22px;
      padding:0 6px;
      border-radius:999px;
      background:rgba(30,144,255,.14);
      border:1px solid rgba(30,144,255,.20);
      font-size:12px;
    }
    .aa-notes-row td{
      padding-top:0;
      border-bottom:0;
    }
    .aa-notes-box{
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      padding:10px 12px;
      box-shadow:0 10px 20px rgba(0,0,0,.06);
      margin:0 0 12px;
    }
    .aa-notes-item{
      border-top:1px dashed var(--border);
      padding-top:8px;
      margin-top:8px;
    }
    .aa-notes-item:first-child{
      border-top:0;
      padding-top:0;
      margin-top:0;
    }
    .aa-note-meta{
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      margin-bottom:4px;
    }
    .aa-note-text{
      font-weight:800;
      color:#111;
      white-space:pre-wrap;
    }

    .raw{
      display:none;
      margin-top:10px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#0b1220;
      color:#e5e7eb;
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      overflow:auto;
      box-shadow:0 12px 26px rgba(0,0,0,.16);
    }
    .raw.show{ display:block; }

    @media (max-width: 900px){
      .auth .row{ grid-template-columns:1fr; }
      .btns{ justify-content:flex-start; }
      .search-row{ grid-template-columns:1fr; }
      .aa-grid-2{ grid-template-columns:1fr; }
      .brand{ min-width:0; }
      .pill{ font-size:12px; }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo"><img src="./logo.png" alt="OkObserver" /></div>
        <div class="brand-text">
          <div class="brand-title">Arnold Admin</div>
          <div class="brand-sub">OkObserver admin lookups (cookie session)</div>
        </div>
      </div>

      <div class="pill" id="sessionPill">
        <span class="dot" id="sessionDot"></span>
        <span id="sessionText">Session: unknown</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="card auth" aria-label="Authentication">
      <div class="row">
        <div>
          <label for="loginUser">Username</label>
          <input id="loginUser" autocomplete="username" placeholder="admin user id" />
        </div>
        <div>
          <label for="loginPass">Password</label>
          <input id="loginPass" type="password" autocomplete="current-password" placeholder="••••••••" />
        </div>
        <div class="btns">
          <button id="btnLogin">Login</button>
          <button class="secondary" id="btnLogout">Logout</button>
        </div>
      </div>

      <div class="search-row">
        <div>
          <label for="q">Search</label>
          <input id="q" placeholder="email, order #, subscription #, name…" />
        </div>
        <button id="btnSearch">Search</button>
        <button class="secondary" id="btnTotals">Totals</button>
      </div>

      <div class="msg" id="statusLine"></div>
    </section>

    <button class="toggle-raw" id="toggleRaw">Toggle Raw JSON</button>
    <pre class="raw" id="rawJson"></pre>

    <div id="app"></div>
  </main>

  <!-- Cache-bust main.js build -->
  <script src="./main.js?v=2026-02-26e"></script>
</body>
</html>
